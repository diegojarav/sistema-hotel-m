name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        run: |
          cd backend && python -m pytest tests/ -v             --cov=services --cov=api             --cov-report=term-missing             --cov-fail-under=75             -k "not kpi and not perf"

      - name: Run KPI evaluation tests
        run: cd backend && python -m pytest tests/test_kpis.py -v -m kpi

      - name: Run performance benchmarks
        run: cd backend && python -m pytest tests/test_performance.py -v -m perf

      - name: Upload KPI/Perf reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/tests/reports/*.json
          retention-days: 90

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend_mobile && npm ci

      - name: Build frontend
        run: cd frontend_mobile && npm run build
